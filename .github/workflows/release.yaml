name: Create Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (Deprecated: Version is now read from src/data/user_version.json)'
        required: false

  push:
    tags:
      - 'v*'  # 当推送新标签时触发

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install GitHub CLI
        run: sudo apt-get install gh

      - name: Authenticate GitHub CLI
        run: gh auth login --with-token <<< "${{ secrets.GITHUB_TOKEN }}"

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 'Install dependencies'
        run: python -m pip install pandas openpyxl

      - name: Set Version and Prepare Files
        id: prepare_version
        run: |
          # Read version from user_version.json
          MOD_VER=$(jq -r '.mod_version' src/data/user_version.json)
          echo "MOD_VER=${MOD_VER}" >> $GITHUB_ENV
          
          # Update root version.json
          cat <<EOF > version.json
          {
              "version": "${MOD_VER}",
              "build_date": "$(date -u --date='+8 hours' '+%Y-%m-%d %H:%M:%S') (UTC+8)"
          }
          EOF
          
          # Run python to build regular natives
          mkdir -p user3_output
          python src/normal_otomon_body_scale.py \
            --rsz src/data/rszmhst3.json \
            --natives src/data/unpak/natives \
            --output user3_output \
            --scale 1.0
            
          # Run python to build enemy size natives
          mkdir -p user3_with_enemy_size_output
          python src/normal_otomon_body_scale.py \
            --rsz src/data/rszmhst3.json \
            --natives src/data/unpak/natives \
            --output user3_with_enemy_size_output \
            --scale 1.0 \
            --apply-enemy-scale \
            --json-dir src/data/json

          # Prepare Fluffy Mod Manager files (Normal)
          cp src/assets/screenshot.png user3_output/cover.png
          cat <<EOF > user3_output/modinfo.ini
          name=Normal Monsties Size
          description=A mod for Monster Hunter Stories 3 that keep all monsties in normal size.
          author=Egg Targaryen
          screenshot=cover.png
          category=Gameplay
          homepage=https://www.nexusmods.com/monsterhunterstories3twistedreflection/mods/172
          version=${MOD_VER}
          EOF
          
          # Zip the 'natives' folder, FMM config and cover
          cd user3_output
          zip -r "../NormalOtomonScale_${MOD_VER}.zip" natives cover.png modinfo.ini
          cd ..
          
          # Prepare Fluffy Mod Manager files (Enemy Size)
          cp src/assets/screenshot.png user3_with_enemy_size_output/cover.png
          cat <<EOF > user3_with_enemy_size_output/modinfo.ini
          name=Normal Monsties Size (with Enemy Size)
          description=A mod for Monster Hunter Stories 3 that keep all monsties in normal size and applies enemy scaling.
          author=Egg Targaryen
          screenshot=cover.png
          category=Gameplay
          homepage=https://www.nexusmods.com/monsterhunterstories3twistedreflection/mods/172
          version=${MOD_VER}
          EOF
          
          # Zip the 'natives' folder, FMM config and cover (with enemy size)
          cd user3_with_enemy_size_output
          zip -r "../NormalOtomonScale_with_enemy_size_${MOD_VER}.zip" natives cover.png modinfo.ini
          cd ..

      - name: Check if release exists and delete it
        run: |
          if gh release view ${{ env.MOD_VER }}; then
            gh release delete ${{ env.MOD_VER }} --yes
          fi

      - name: Generate checksums
        run: |
          sha256sum "NormalOtomonScale_${{ env.MOD_VER }}.zip" > "NormalOtomonScale_${{ env.MOD_VER }}.zip.sha256"
          sha256sum "NormalOtomonScale_with_enemy_size_${{ env.MOD_VER }}.zip" > "NormalOtomonScale_with_enemy_size_${{ env.MOD_VER }}.zip.sha256"

      - name: Prepare release notes
        id: generate_notes
        run: |
          echo "### 版本下载 / Release Downloads" > release_notes.md
          echo "- **[NormalOtomonScale_${{ env.MOD_VER }}.zip](https://github.com/${{ github.repository }}/releases/download/${{ env.MOD_VER }}/NormalOtomonScale_${{ env.MOD_VER }}.zip)**" >> release_notes.md
          echo "- **[NormalOtomonScale_with_enemy_size_${{ env.MOD_VER }}.zip](https://github.com/${{ github.repository }}/releases/download/${{ env.MOD_VER }}/NormalOtomonScale_with_enemy_size_${{ env.MOD_VER }}.zip)**" >> release_notes.md
          echo "" >> release_notes.md
          echo "### 更新日志 / Changelogs" >> release_notes.md
          if [ -f CHANGELOGS.md ]; then
            cat CHANGELOGS.md >> release_notes.md
          else
            echo "未找到CHANGELOGS.md文件 / CHANGELOGS.md file not found." >> release_notes.md
          fi
          echo "### 文件校验 / Checksums" >> release_notes.md
          echo "- \`NormalOtomonScale_${{ env.MOD_VER }}.zip\` SHA-256: $(cut -d ' ' -f1 NormalOtomonScale_${{ env.MOD_VER }}.zip.sha256)" >> release_notes.md
          echo "- \`NormalOtomonScale_with_enemy_size_${{ env.MOD_VER }}.zip\` SHA-256: $(cut -d ' ' -f1 NormalOtomonScale_with_enemy_size_${{ env.MOD_VER }}.zip.sha256)" >> release_notes.md
          echo "### 打包时间 / Build Time" >> release_notes.md
          echo "- $(date)" >> release_notes.md

      - name: Create GitHub Release
        id: create_release
        run: |
          gh release create ${{ env.MOD_VER }} *.zip --title "${{ env.MOD_VER }} Release" --notes-file release_notes.md

      - name: Commit changes
        run: |
          git config --local user.email "dzxrly2@gmail.com"
          git config --local user.name "dzxrly2"
          git add .
          git commit -m ":bookmark: 从 Github Action 构建并推送更新 (${{ env.MOD_VER }})"
          git push -f origin HEAD:main
